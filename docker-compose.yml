services:
  db:
    container_name: postgres_open_app
    image: postgres:17
    environment:
      POSTGRES_DB: open_app
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Azerty,123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin_open_app
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
