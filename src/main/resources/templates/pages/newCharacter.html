<html lang="en" layout:decorate="~{layouts/layoutMain}" xmlns:layout="http://www.w3.org/1999/xhtml">


<main layout:fragment="content">
    <h1>New Character</h1>
    
    <section>
    	<form class="form" th:action="@{/openD6/characters/new}" method="post" enctype="multipart/form-data">
    
		    <input type="text" name="name" placeholder="Name's character" />
		    
		    <input type="file" name="image" />
		    
		    <button type="submit">Create</button>
		</form>
    </section>
    
    
</main>


</html>
